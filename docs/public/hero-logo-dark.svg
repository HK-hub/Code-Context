<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <!-- 暗色模式渐变：柔和紫-蓝 -->
    <linearGradient id="heroGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="40%" style="stop-color:#818cf8"/>
      <stop offset="70%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>

    <!-- 意境流光渐变（暗色模式更亮） -->
    <linearGradient id="flowGradDark" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e9d5ff;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#a5b4fc;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:0.4"/>
    </linearGradient>

    <!-- 柔光效果 -->
    <filter id="softGlowDark" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景：暗色模式下使用更明显的光晕 -->
  <circle cx="200" cy="200" r="180" fill="url(#heroGradDark)" opacity="0.12"/>
  <circle cx="200" cy="200" r="140" fill="url(#heroGradDark)" opacity="0.18"/>

  <!-- 意境流动曲线 - 暗色模式更柔和 -->
  <g fill="none" stroke="url(#flowGradDark)" stroke-linecap="round" opacity="0.5">
    <path d="M60 320 Q100 280, 140 300 T220 260 T340 220" stroke-width="3"/>
    <path d="M80 280 Q120 240, 180 260 T260 200 T360 160" stroke-width="2"/>
    <path d="M100 240 Q150 200, 200 220 T300 180" stroke-width="1.5"/>
  </g>

  <!-- 核心符号：C（Context）与代码括号的融合 -->
  <g filter="url(#softGlowDark)">
    <!-- 左侧代码括号 < -->
    <path d="M100 140 L70 200 L100 260"
          fill="none" stroke="#a78bfa" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Context之C -->
    <path d="M200 120
             Q150 120, 130 160
             Q110 200, 130 240
             Q150 280, 200 280"
          fill="none" stroke="url(#heroGradDark)" stroke-width="10" stroke-linecap="round"/>

    <!-- C内部：代码斜杠 -->
    <line x1="175" y1="140" x2="140" y2="260"
          stroke="#818cf8" stroke-width="6" stroke-linecap="round" opacity="0.85"/>

    <!-- 右侧代码括号 > -->
    <path d="M300 140 L330 200 L300 260"
          fill="none" stroke="#60a5fa" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 连接点 -->
    <circle cx="200" cy="200" r="8" fill="#c4b5fd" opacity="0.85"/>
    <circle cx="200" cy="200" r="4" fill="#1e1b4b" opacity="0.9"/>
  </g>

  <!-- 意境点缀 -->
  <g fill="#a78bfa" opacity="0.5">
    <circle cx="85" cy="180" r="3"/>
    <circle cx="315" cy="180" r="3"/>
    <circle cx="90" cy="220" r="2"/>
    <circle cx="310" cy="220" r="2"/>
    <circle cx="160" cy="160" r="2"/>
    <circle cx="240" cy="160" r="2"/>
  </g>

  <!-- 底部意境波浪 -->
  <path d="M40 340 Q100 320, 160 340 T280 320 T360 340"
        fill="none" stroke="url(#flowGradDark)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- 顶部星光 -->
  <g fill="#e9d5ff" opacity="0.6">
    <polygon points="200,60 204,70 214,70 206,76 210,86 200,80 190,86 194,76 186,70 196,70" transform="scale(0.8) translate(50,30)"/>
  </g>
</svg>