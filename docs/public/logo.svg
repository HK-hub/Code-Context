<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- 渐变：紫-蓝融合 -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="60%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect width="32" height="32" rx="8" fill="url(#logoGrad)"/>

  <!-- 代码括号 < > -->
  <g fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10 8 L5 16 L10 24"/>
    <path d="M22 8 L27 16 L22 24"/>
  </g>

  <!-- C字 - Context -->
  <path d="M16 9 Q11 9, 10 13 Q8 16, 10 19 Q11 23, 16 23"
        fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- 中心点 -->
  <circle cx="16" cy="16" r="1.5" fill="white"/>

  <!-- 意境曲线 -->
  <path d="M4 28 Q16 26, 28 28" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-linecap="round"/>
</svg>