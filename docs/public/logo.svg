<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
  <defs>
    <!-- 主渐变色 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <!-- 光晕效果 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect width="50" height="50" rx="12" fill="url(#mainGrad)" opacity="0.95"/>

  <!-- 代码括号 < > -->
  <g fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- 左括号 < -->
    <path d="M16 14 L8 25 L16 36"/>
    <!-- 右括号 > -->
    <path d="M34 14 L42 25 L34 36"/>
  </g>

  <!-- 斜杠 / 代表代码 -->
  <line x1="29" y1="12" x2="21" y2="38" stroke="white" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- 意境曲线 - 代表灵感流动 -->
  <path d="M10 44 Q25 40, 40 44" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
</svg>